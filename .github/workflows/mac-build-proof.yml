name: Mac Build Proof

on:
  push:
    branches: [main, "architecture/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apple-silicon:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify source tree
        run: pnpm verify

      - name: Test frontend
        run: pnpm test

      - name: Build desktop frontend
        run: pnpm build

      - name: Build Otzaria plugin
        run: |
          pnpm plugin:build
          pnpm plugin:package

      - name: Apply Rust formatting
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all
          git diff -- src-tauri > rustfmt.patch
          ditto -c -k --sequesterRsrc --keepParent src-tauri formatted-src-tauri.zip

      - name: Verify Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Upload formatted Rust sources
        uses: actions/upload-artifact@v4
        with:
          name: bkf-ai-rustfmt-output
          path: |
            rustfmt.patch
            formatted-src-tauri.zip
          if-no-files-found: error

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --manifest-path src-tauri/Cargo.toml --workspace

      - name: Build native app and DMG
        run: pnpm tauri build --target aarch64-apple-darwin --bundles app,dmg

      - name: Verify artifacts
        run: |
          test -d "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/BKF AI.app"
          find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | grep -q .
          test -f "plugins/otzaria-bkf-bkc/otzaria-bkf-bkc.otzplugin"
          file "src-tauri/target/aarch64-apple-darwin/release/bkf-ai" | grep -q arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bkf-ai-next-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            plugins/otzaria-bkf-bkc/*.otzplugin
          if-no-files-found: error
